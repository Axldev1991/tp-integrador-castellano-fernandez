<!-- Modal de Éxito / Agradecimiento -->
<div id="modalExitoGlobal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <h2 id="modalExitoTitulo">¡Operación Exitosa! 🎉</h2>
        <p id="modalExitoMensaje">El proceso finalizó correctamente.</p>
        <div class="modal-buttons">
            <button id="btnExitoGlobalAceptar" class="btn btn-confirm">Aceptar</button>
        </div>
    </div>
</div>

<!-- Modal de Alerta / Error -->
<div id="modalAlertaGlobal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <h2 id="modalAlertaTitulo">Atención</h2>
        <p id="modalAlertaMensaje">Ocurrió un problema.</p>
        <div class="modal-buttons">
            <button id="btnAlertaGlobalAceptar" class="btn btn-confirm">Aceptar</button>
        </div>
    </div>
</div>

<!-- Modal de Confirmación -->
<div id="modalConfirmacionGlobal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <h2 id="modalConfirmacionTitulo">Confirmar Acción</h2>
        <p id="modalConfirmacionMensaje">¿Estás seguro de que deseas continuar?</p>
        <div class="modal-buttons">
            <button id="btnConfirmarGlobalSi" class="btn btn-confirm">Sí, confirmar</button>
            <button id="btnConfirmarGlobalNo" class="btn btn-cancel">Cancelar</button>
        </div>
    </div>
</div>
